<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识卡片管理器</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .card h3 { margin: 0 0 10px 0; }
        .actions { margin-top: 10px; }
        .actions a { color: #c00; text-decoration: none; }
        form.search { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>📇 知识卡片管理器</h1>
    <a href="/add">➕ 添加新卡片</a>
    <hr>

    {% if not cards %}
        <p>📭 目前没有任何卡片。</p>
    {% else %}
        {% for card in cards %}
        <div class="card">
            <h3>{{ card.title }} <small>(ID: {{ card.id }})</small></h3>
            <p>{{ card.content }}</p>
            <div class="actions">
                <a href="/edit/{{ card.id }}">✏️ 编辑</a>
                <a href="/delete/{{ card.id }}" onclick="return confirm('确定删除这张卡片吗？')">🗑️ 删除</a>
            </div>
        </div>
        {% endfor %}
    {% endif %}

    <hr>
    <form class="search" action="/search" method="get">
        <input type="text" name="q" placeholder="搜索关键词...">
        <button type="submit">🔍 搜索</button>
    </form>
</body>
</html>
